<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>內部信封標籤規定</title>

<style>
    body {
        margin: 0;
        font-family: "Microsoft JhengHei", Arial, sans-serif;
        background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
        color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .box {
        width: 90%;
        max-width: 900px;
        padding: 40px;
        background: rgba(0, 0, 0, 0.55);
        border-radius: 18px;
        box-shadow: 0 0 25px rgba(0, 255, 255, 0.25);
    }

    h1 {
        text-align: center;
        font-size: 38px;
        color: #00e5ff;
        margin-bottom: 20px;
        letter-spacing: 2px;
    }

    .desc {
        font-size: 20px;
        line-height: 1.8;
        text-align: center;
        margin-bottom: 35px;
        color: #e0e0e0;
    }

    .btn-area {
        display: flex;
        flex-direction: column;
        gap: 18px;
        align-items: center;
    }

    .btn {
        width: 80%;
        max-width: 420px;
        padding: 16px;
        font-size: 20px;
        text-align: center;
        color: #fff;
        text-decoration: none;
        border-radius: 12px;
        background: linear-gradient(45deg, #00e5ff, #0077ff);
        box-shadow: 0 0 15px rgba(0, 229, 255, 0.35);
        transition: 0.3s;
    }

    .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 25px rgba(0, 229, 255, 0.7);
    }

    .footer {
        margin-top: 25px;
        text-align: center;
        font-size: 14px;
        color: #bbbbbb;
    }
</style>
</head>

<body>

<div class="box">

    <h1>內部信封標籤規定</h1>

    <div class="desc">
        大樓管理課收發部門為使國內信件及包裹收發作業順利，<br>
        請各單位務必於內部信封上填寫清楚且完整之收件者資料。
    </div>

            📄 業洽函資訊
        </a>

        <a class="btn" href="https://www.dropbox.com/scl/fi/zitbehi4sz8efb177cau6/.pdf?rlkey=ncpnd99edvs9jt54zvva4pjni&st=ise7cjwc&dl=0" target="_blank">
           ⚠️ 錯誤信件範例
        </a>

        <a class="btn" href="https://www.dropbox.com/scl/fi/8wi79264jgocsccf3s8t3/.pdf?rlkey=772aq7ucinrm7eig4bvif3ve1&st=d8hzdp3q&dl=0" target="_blank">
            ✔ 正確信件範例
        </a>

    </div>

    <div class="footer">
        ※ 點擊按鈕可開啟對應說明文件
